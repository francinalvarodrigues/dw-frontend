<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Tabuada</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    text-align: center;
    max-width: 500px;
}

h1 {
    color: #333;
    margin-bottom: 20px;
}

p {
    color: #666;
    font-size: 16px;
    margin-bottom: 20px;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    justify-content: center;
}

input {
    padding: 10px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 5px;
    width: 100px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #764ba2;
}

#resultado {
    margin-top: 30px;
    text-align: left;
    background: #f5f5f5;
    padding: 20px;
    border-radius: 5px;
    max-height: 400px;
    overflow-y: auto;
}

.resultado-item {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

.resultado-item:last-child {
    border-bottom: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔢 Tabuada</h1>
    
    <p>Escreva um número na caixa abaixo e te monte a tabuada</p>
    
    <div class="input-group">
        <input type="number" id="numero" placeholder="Digite um número">
        <button onclick="gerarTabuada()">Gerar</button>
    </div>
    
    <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
